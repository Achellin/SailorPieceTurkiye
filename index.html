<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sailor Piece - Türk Topluluğu</title>

    <meta property="og:title" content="Sailor Piece - Türk Topluluğu">
    <meta property="og:description" content="Sailor Piece Türkiye topluluk sayfası yayında! Aramıza katıl.">
    <meta property="og:image" content="arkaplan.png">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://achellin.github.io/SailorPieceTurkiye/">
    <meta name="theme-color" content="#FF0000">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow: hidden;
            background-color: #000; /* Kenarlarda boşluk kalırsa siyah görünsün */
        }

        /* Arka plan görseli - TAM SIĞDIRMA AYARI */
        .bg-image {
            background-image: url('arkaplan.png');
            background-size: contain; /* Görseli kesmeden çerçeveye sığdırır */
            background-position: center;
            background-repeat: no-repeat;
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
            /* Parlaklığı senin için biraz artırdım, Esdeath net görünsün */
            filter: brightness(0.8); 
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 0 20px;
            /* Yazıların fotoğrafın üstünde okunması için hafif gölge */
            background: rgba(0, 0, 0, 0.2); 
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            text-shadow: 3px 3px 15px rgba(0,0,0,0.9);
        }

        .motto {
            font-size: 1.1rem;
            max-width: 700px;
            line-height: 1.5;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(8px);
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .discord-btn {
            background-color: #5865F2;
            color: white;
            padding: 15px 35px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            border-radius: 50px;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(88, 101, 242, 0.4);
            display: inline-block;
        }

        .discord-btn:hover {
            background-color: #4752c4;
            transform: scale(1.05);
            box-shadow: 0 6px 25px rgba(88, 101, 242, 0.6);
        }

        /* Mobil ekran ayarları */
        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .motto { font-size: 0.9rem; padding: 15px; }
            .bg-image { background-size: cover; } /* Mobilde yanlar boş kalmasın diye cover daha iyidir */
        }
    </style>
</head>
<body>

    <div class="bg-image"></div>

    <div class="container">
        <h1>Sailor Piece 🇹🇷</h1>
        
        <div class="motto">
            <p>Bu topluluk, Sailor Piece evreninde Türk oyuncuların bir araya geldiği güçlü bir birliktir. Kardeşlik, saygı ve milli değerlerimizi ön planda tutan bir aileyiz.</p>
            <strong>Sen de aramıza katıl ve bu gücün bir parçası ol!</strong>
        </div>

        <a href="https://discord.gg/GVKTDjEqRD" class="discord-btn" target="_blank">
            Discord Sunucumuza Katıl
        </a>
    </div>

</body>
</html>
